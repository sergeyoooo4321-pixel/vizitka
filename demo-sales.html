<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0A">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; connect-src https://ollama.com;">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>Демо: ИИ-Отдел продаж — Сергей Венчаков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="demo-style.css">
    <style>
        :root { --accent: #00d4ff; }
        .demo-avatar { background: rgba(0,212,255,0.1); }
        .quick-btn:hover { background: rgba(0,212,255,0.08); }
    </style>
</head>
<body>

    <div class="demo-wrapper">
        <a href="project-sales.html" class="demo-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Назад к описанию
        </a>
        <div class="demo-header">
            <div class="demo-header-left">
                <div class="demo-avatar">&#128640;</div>
                <div>
                    <div class="demo-title">TechFlow Sales</div>
                    <div class="demo-subtitle">ИИ-отдел продаж &bull; Онлайн</div>
                </div>
            </div>
            <div class="demo-badge">DEMO</div>
        </div>

        <div class="chat-area" id="chat"></div>
        <div class="quick-row" id="quickRow"></div>

        <div class="input-row">
            <input type="text" id="input" placeholder="Напишите сообщение..." autocomplete="off">
            <button class="send-btn" id="sendBtn" disabled>&uarr;</button>
        </div>
    </div>

<script src="config-sales.js"></script>
<script src="demo-chat.js"></script>

</body>
</html>
